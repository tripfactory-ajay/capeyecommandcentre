<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapeEye — Demo Presentation</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --red:#C8102E;--blue:#003DA5;--dark:#0a0f1e;
  --bg:#f4f6f9;--border:#e2e6ed;--muted:#7a8fa6;
  --gold:#d4980a;--green:#1a7f37;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100vh;width:100vw;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--dark)}

/* ══ ROOT LAYOUT ══ */
.app{
  display:grid;
  grid-template-columns:260px 1fr;
  grid-template-rows:50px calc(100vh - 50px);
  height:100vh;overflow:hidden;
}

/* ── TOPBAR ── */
.topbar{
  grid-column:1/-1;grid-row:1;
  background:#fff;border-bottom:2px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:0 14px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);z-index:100;
}
.tb-brand{display:flex;align-items:center;gap:8px;margin-right:8px;padding-right:14px;border-right:1px solid var(--border);flex-shrink:0}
.tb-mark{background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;padding:4px 8px;border-radius:5px;letter-spacing:1px}
.tb-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;color:var(--dark);line-height:1}
.tb-sub2{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.tb-mid{flex:1;display:flex;align-items:center;justify-content:center;gap:8px}
.slide-ctr{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;white-space:nowrap}
.prog-track{width:160px;height:3px;background:var(--border);border-radius:2px;flex-shrink:0}
.prog-fill{height:100%;background:var(--red);border-radius:2px;transition:width .35s ease}
.tb-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tbtn{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:5px;text-decoration:none}
.tbtn-ghost{background:var(--bg);border:1px solid var(--border);color:var(--muted)}.tbtn-ghost:hover{color:var(--dark)}
.tbtn-red{background:var(--red);color:#fff}.tbtn-red:hover{background:#a00d24}
.tbtn-blue{background:var(--blue);color:#fff}.tbtn-blue:hover{background:#002d7a}
.kbd{background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:9px;color:var(--muted);font-family:'DM Mono',monospace}

/* ── SIDEBAR ── */
.sidebar{
  grid-column:1;grid-row:2;
  background:#0f172a;overflow-y:auto;
  border-right:1px solid rgba(255,255,255,.06);
}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.sec-lbl{padding:14px 14px 5px;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.25)}
.sthumb{padding:8px 12px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;display:flex;align-items:flex-start;gap:8px}
.sthumb:hover{background:rgba(255,255,255,.04);border-left-color:rgba(255,255,255,.15)}
.sthumb.active{background:rgba(200,16,46,.12);border-left-color:var(--red)}
.sth-num{font-size:9px;font-weight:700;color:rgba(255,255,255,.25);min-width:16px;margin-top:2px;font-family:'DM Mono',monospace}
.sth-title{font-size:11px;font-weight:600;color:rgba(255,255,255,.55);line-height:1.3}
.sthumb.active .sth-title{color:#fff}
.sthumb.active .sth-num{color:var(--red)}
.sth-time{font-size:9px;color:rgba(255,255,255,.2);margin-top:1px}
.sth-badge{display:inline-block;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-top:3px;letter-spacing:.3px}
.b-intro{background:rgba(200,16,46,.2);color:#ff8096}
.b-demo{background:rgba(0,61,165,.3);color:#7eb8ff}
.b-detail{background:rgba(26,127,55,.2);color:#6ee7a0}

/* ── RIGHT COLUMN: slide + notes ── */
.right-col{
  grid-column:2;grid-row:2;
  display:grid;
  grid-template-rows:1fr 160px;
  overflow:hidden;
}

/* ── SLIDE AREA ── */
.slide-area{overflow:hidden;background:var(--dark);position:relative}
.slide{display:none;width:100%;height:100%}
.slide.active{display:flex;animation:sIn .25s ease}
@keyframes sIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}

/* ── TITLE SLIDE ── */
.sl-title{
  flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#070c1a 0%,#0c1836 60%,#070c1a 100%);
  padding:40px;text-align:center;position:relative;overflow:hidden;
}
.sl-title::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 700px 350px at 50% 55%,rgba(0,61,165,.25),transparent);pointer-events:none}
.sl-title::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--blue));pointer-events:none}
.t-eye{font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:rgba(200,16,46,.7);margin-bottom:12px}
.t-h1{font-family:'Barlow Condensed',sans-serif;font-size:68px;font-weight:900;color:#fff;line-height:.9;letter-spacing:-1px;margin-bottom:12px}
.t-h1 span{color:var(--red)}
.t-h2{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:700;color:rgba(255,255,255,.6);margin-bottom:18px}
.t-body{font-size:14px;color:rgba(255,255,255,.45);max-width:480px;line-height:1.6}
.t-pills{display:flex;gap:6px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.t-pill{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6)}
.live-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--green);background:rgba(26,127,55,.1);padding:4px 10px;border-radius:20px;border:1px solid rgba(26,127,55,.2)}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── SPLIT SLIDE ── */
.sl-split{flex-direction:row}
.sp-left{width:320px;flex-shrink:0;padding:24px 22px;background:#fff;border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.sp-right{flex:1;overflow:hidden;position:relative;background:#eef0f5}
.sp-right iframe{width:100%;height:100%;border:none;display:block}
.iframe-tag{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.65);color:#fff;font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:1px;z-index:10;pointer-events:none}
.sl-eye{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--red)}
.sl-h{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:var(--dark);line-height:1;margin:3px 0 6px}
.sl-sub{font-size:12px;color:var(--muted);line-height:1.5}
.pts{display:flex;flex-direction:column;gap:7px;flex:1}
.pt{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;background:var(--bg);border-radius:7px;border-left:3px solid var(--red)}
.pt i{color:var(--red);font-size:12px;margin-top:1px;flex-shrink:0}
.pt-t{font-size:12px;color:#1e293b;font-weight:500;line-height:1.4}
.pt-t strong{color:var(--red)}
.pt.b{border-left-color:var(--blue)}.pt.b i{color:var(--blue)}.pt.b .pt-t strong{color:var(--blue)}
.pt.g{border-left-color:var(--green)}.pt.g i{color:var(--green)}.pt.g .pt-t strong{color:var(--green)}
.pt.o{border-left-color:var(--gold)}.pt.o i{color:var(--gold)}.pt.o .pt-t strong{color:var(--gold)}
.sp-note{font-size:11px;color:var(--muted);background:var(--bg);padding:9px 11px;border-radius:7px;border-left:3px solid var(--blue);line-height:1.5}

/* ── STATS/DETAIL SLIDE ── */
.sl-detail{flex-direction:column;background:#fff;padding:32px 36px;gap:20px;overflow-y:auto}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.sc{background:var(--bg);border-radius:10px;padding:18px;border-top:3px solid var(--sc,var(--red));text-align:center}
.sc-v{font-family:'Barlow Condensed',sans-serif;font-size:44px;font-weight:900;color:var(--sc,var(--red));line-height:1}
.sc-l{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.sc-s{font-size:11px;color:var(--muted);margin-top:3px}

/* ── NOTES PANEL ── */
.notes-panel{
  background:#1a2537;
  border-top:2px solid rgba(255,255,255,.05);
  padding:12px 20px;overflow-y:auto;
}
.notes-hdr{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.notes-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.25)}
.notes-t{font-size:9px;color:rgba(255,255,255,.2);margin-left:auto;font-family:'DM Mono',monospace}
.notes-body{font-size:12px;color:rgba(255,255,255,.65);line-height:1.7;white-space:pre-wrap}
.nh{color:#fcd34d;font-weight:700}
.ntip{display:inline-flex;align-items:center;gap:4px;background:rgba(212,152,10,.15);color:#fcd34d;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.ncue{display:inline-flex;align-items:center;gap:4px;background:rgba(0,61,165,.25);color:#7eb8ff;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tb-brand">
      <div class="tb-mark">CE</div>
      <div><div class="tb-name">CapeEye</div><div class="tb-sub2">Demo Deck</div></div>
    </div>
    <div class="tb-mid">
      <span class="slide-ctr" id="ctr">1 / 12</span>
      <div class="prog-track"><div class="prog-fill" id="prog" style="width:8%"></div></div>
    </div>
    <div class="tb-right">
      <span class="kbd">←</span><span class="kbd">→</span>
      <button class="tbtn tbtn-ghost" onclick="prevSlide()"><i class="fas fa-chevron-left"></i> Prev</button>
      <button class="tbtn tbtn-red" onclick="nextSlide()">Next <i class="fas fa-chevron-right"></i></button>
      <a href="https://tripfactory-ajay.github.io/capeyecommandcentre/index.html" target="_blank" class="tbtn tbtn-blue"><i class="fas fa-external-link-alt"></i> Full Screen</a>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar"></div>

  <!-- RIGHT COLUMN -->
  <div class="right-col">
    <div class="slide-area" id="slideArea"></div>
    <div class="notes-panel">
      <div class="notes-hdr">
        <i class="fas fa-microphone" style="color:rgba(255,255,255,.25);font-size:10px"></i>
        <span class="notes-lbl">Speaker Notes</span>
        <span class="notes-t" id="notesT">~0 min</span>
      </div>
      <div class="notes-body" id="notesBody"></div>
    </div>
  </div>

</div>

<script>
const BASE = './';

const SLIDES = [
  // ── 0: TITLE ──
  {
    type:'title', section:'Introduction', label:'Title', time:'2 min',
    html:`
      <div class="slide slide-title">
        <div class="title-eyebrow">Auto Capital · Back-Office System</div>
        <div class="title-h1">Cape<span>Eye</span></div>
        <div class="title-h2">Command Centre</div>
        <div class="title-body">A complete vehicle operations platform — from intake to sale, every step tracked, every handover logged.</div>
        <div class="title-pills">
          <div class="pill"><i class="fas fa-car" style="margin-right:6px;color:var(--red)"></i>Stock Management</div>
          <div class="pill"><i class="fas fa-tasks" style="margin-right:6px;color:var(--blue)"></i>Workflow & Handovers</div>
          <div class="pill"><i class="fas fa-key" style="margin-right:6px;color:var(--gold)"></i>Keys Tracking</div>
          <div class="pill"><i class="fas fa-chart-bar" style="margin-right:6px;color:var(--green)"></i>Analytics & Alerts</div>
          <div class="pill"><i class="fas fa-clipboard-list" style="margin-right:6px;color:#a78bfa)"></i>Full Audit Trail</div>
        </div>
        <div style="margin-top:40px;display:flex;align-items:center;gap:10px">
          <div class="live-badge"><div class="live-dot"></div>Live Demo Available</div>
          <span style="color:rgba(255,255,255,.3);font-size:12px">tripfactory-ajay.github.io/capeyecommandcentre</span>
        </div>
      </div>`,
    notes:`Welcome everyone to the CapeEye demo. 

CapeEye is Auto Capital's new back-office command centre — it replaces the mix of spreadsheets, WhatsApp messages and verbal handovers with a single place that tracks every vehicle from the moment it arrives on site to the moment it's sold.

<span class="note-highlight">Key message:</span> Everything is connected. Stock, workflow, keys, alerts, analytics — all in one system, all in real time.

Today's run-through is about 35 minutes. I'll walk through each section, show it live, and we can take questions at the end.`
  },

  // ── 1: THE PROBLEM ──
  {
    type:'stats', section:'Introduction', label:'Why We Built This', time:'3 min',
    html:`
      <div class="slide slide-stats">
        <div>
          <div class="slide-eyebrow">The Problem We Solved</div>
          <div class="slide-h" style="font-size:36px">Before CapeEye</div>
          <div class="slide-sub">Every dealership runs into the same operational headaches as the team grows</div>
        </div>
        <div class="stats-grid">
          <div class="stat-card" style="--sc:var(--red)">
            <div class="stat-val">?</div>
            <div class="stat-lbl">Where's that car?</div>
            <div class="stat-sub">No single source of truth for vehicle location or stage</div>
          </div>
          <div class="stat-card" style="--sc:var(--gold)">
            <div class="stat-val">📱</div>
            <div class="stat-lbl">WhatsApp Handovers</div>
            <div class="stat-sub">Handovers buried in group chats — no record, no accountability</div>
          </div>
          <div class="stat-card" style="--sc:var(--blue)">
            <div class="stat-val">📊</div>
            <div class="stat-lbl">Spreadsheet Chaos</div>
            <div class="stat-sub">Multiple spreadsheets, always out of date, different versions</div>
          </div>
          <div class="stat-card" style="--sc:var(--orange,#d4600a)">
            <div class="stat-val">🔑</div>
            <div class="stat-lbl">Lost Keys</div>
            <div class="stat-sub">Keys go missing, no log of who took what or when</div>
          </div>
          <div class="stat-card" style="--sc:var(--green)">
            <div class="stat-val">⏰</div>
            <div class="stat-lbl">Aged Stock</div>
            <div class="stat-sub">Vehicles sitting 90+ days unnoticed — no automatic alerts</div>
          </div>
          <div class="stat-card" style="--sc:#6366f1">
            <div class="stat-val">🚫</div>
            <div class="stat-lbl">No Audit Trail</div>
            <div class="stat-sub">Can't see who did what, when — disputes with no paper trail</div>
          </div>
        </div>
      </div>`,
    notes:`Before we look at the system, let's talk about why it was built.

These are the six things that slow every growing dealership down. You've probably experienced most of them.

<span class="note-highlight">The key insight:</span> None of these are unique problems — they're all symptoms of the same thing: no single connected system.

CapeEye solves all six. Let me show you how.

<span class="note-tip">💡 Tip</span> — pause here and ask if any of these resonate with the people on the call before moving on.`
  },

  // ── 2: DASHBOARD OVERVIEW ──
  {
    type:'split', section:'Pages', label:'Dashboard', time:'4 min',
    url: BASE+'index.html',
    html:`
      <div class="slide slide-split">
        <div class="split-left">
          <div>
            <div class="slide-eyebrow">Page 1 of 11</div>
            <div class="slide-h">Command<br>Dashboard</div>
            <div class="slide-sub">The first thing you see every morning. All the numbers that matter, at a glance.</div>
          </div>
          <div class="points">
            <div class="point"><i class="fas fa-th-large"></i><div class="point-text"><strong>6 live KPIs</strong> — total stock, in stock, in transit, off-site, subject to finance, total value</div></div>
            <div class="point blue"><i class="fas fa-bell"></i><div class="point-text"><strong>Alert strip</strong> — MOT expiring, no price, blocked vehicles flagged immediately</div></div>
            <div class="point green"><i class="fas fa-car"></i><div class="point-text"><strong>Stock table</strong> — search and filter all 300+ vehicles instantly by status or keyword</div></div>
            <div class="point gold"><i class="fas fa-chart-bar"></i><div class="point-text"><strong>Live charts</strong> — top makes, stock by status, price distribution at a glance</div></div>
          </div>
          <div class="live-badge"><div class="live-dot"></div>Live on screen right now</div>
        </div>
        <div class="split-right">
          <div class="iframe-label">LIVE DEMO</div>
          <iframe src="${BASE}index.html" loading="lazy"></iframe>
        </div>
      </div>`,
    notes:`This is the home screen — what the team sees when they open CapeEye.

<span class="demo-cue">🖥 DEMO</span> — The iframe on the right is the actual live site. You can interact with it.

Walk them through:
1. The KPI cards at the top — total stock, total value
2. The alert strip — if there are MOTs expiring or vehicles with no price, they show here
3. The stock table — show the search box working, show the status filter

<span class="note-highlight">Talking point:</span> "Instead of opening ClickDealer and a spreadsheet and checking a WhatsApp group, everything is on one screen."`
  },

  // ── 3: INVENTORY ──
  {
    type:'split', section:'Pages', label:'Inventory', time:'3 min',
    url: BASE+'inventory.html',
    html:`
      <div class="slide slide-split">
        <div class="split-left">
          <div>
            <div class="slide-eyebrow">Page 2 of 11</div>
            <div class="slide-h">Inventory</div>
            <div class="slide-sub">The full stock list — every vehicle, every detail, fully searchable and sortable.</div>
          </div>
          <div class="points">
            <div class="point"><i class="fas fa-search"></i><div class="point-text"><strong>Smart search</strong> — type any reg, stock no, make or model and results filter instantly</div></div>
            <div class="point blue"><i class="fas fa-filter"></i><div class="point-text"><strong>4 live filters</strong> — status, make, location, fuel type — all interactive, data updates immediately</div></div>
            <div class="point green"><i class="fas fa-sort"></i><div class="point-text"><strong>Sort any column</strong> — click any header to sort by stock no, mileage, price, or make</div></div>
            <div class="point gold"><i class="fas fa-download"></i><div class="point-text"><strong>Export to CSV</strong> — download the filtered view anytime for reporting</div></div>
          </div>
        </div>
        <div class="split-right">
          <div class="iframe-label">LIVE DEMO</div>
          <iframe src="${BASE}inventory.html" loading="lazy"></iframe>
        </div>
      </div>`,
    notes:`The Inventory page is where you see every vehicle in the system.

<span class="demo-cue">🖥 DEMO</span> — Show the filters working:
1. Type a make in the search box — "Ford" — watch the table filter
2. Change the Status dropdown — show "In Stock" vs "In Transit"
3. Click a column header to sort

<span class="note-highlight">Key point:</span> The filters are all live — no "search" button to press, data changes as you type. This is how modern systems should work.

Data is imported daily from ClickDealer — I'll show that later.`
  },

  // ── 4: WORKFLOW ──
  {
    type:'split', section:'Pages', label:'Workflow', time:'6 min',
    url: BASE+'workflow.html',
    html:`
      <div class="slide slide-split">
        <div class="split-left">
          <div>
            <div class="slide-eyebrow">Page 3 of 11 — Core Feature</div>
            <div class="slide-h">Vehicle<br>Workflow</div>
            <div class="slide-sub">Tracks every vehicle through 12 stages from intake to accounts. Every handover recorded.</div>
          </div>
          <div class="points">
            <div class="point"><i class="fas fa-route"></i><div class="point-text"><strong>12 pipeline stages</strong> — Intake → Bodywork → Paint → Workshop → Valeting → Advertising → Delivery → Accounts</div></div>
            <div class="point blue"><i class="fas fa-clipboard-check"></i><div class="point-text"><strong>Stage forms</strong> — each stage has its own checklist: condition, mechanic assigned, parts replaced, valet checklist, advertising channels</div></div>
            <div class="point green"><i class="fas fa-exchange-alt"></i><div class="point-text"><strong>Smart handover</strong> — completing a stage opens a popup showing what was done + what happens next, then hands to the right person</div></div>
            <div class="point gold"><i class="fas fa-lock"></i><div class="point-text"><strong>Blocked vehicles</strong> — flag a vehicle if it's stuck, shows up immediately in alerts</div></div>
          </div>
        </div>
        <div class="split-right">
          <div class="iframe-label">LIVE DEMO</div>
          <iframe src="${BASE}workflow.html" loading="lazy"></iframe>
        </div>
      </div>`,
    notes:`This is the most important page in the system — the Workflow.

<span class="demo-cue">🖥 DEMO — Step by step:</span>
1. Select a vehicle from the dropdown at the top — try "R0461 RF66UBC AUDI A7"
2. The vehicle info card appears with the reg plate and details
3. Show the 12 stage dots — coloured dots show completed stages
4. Click a stage dot to jump to that stage
5. Show a form — e.g. Stage 1 Intake — date acquired, condition, documentation checklist
6. Click "Complete Stage" — the handover modal opens
7. Show the modal: <span class="note-highlight">this is the key bit</span> — it shows what happened in previous stages, what the next stage involves, who's available in that department, then you pick the person and priority

let current = 0;

function buildSidebar(){
  const sb=document.getElementById('sidebar');
  let html='', sec='';
  SLIDES.forEach((s,i)=>{
    if(s.section!==sec){sec=s.section;html+=`<div class="sec-lbl">${sec}</div>`;}
    const bc=s.type==='title'?'b-intro':s.url?'b-demo':'b-detail';
    const bl=s.type==='title'?'Intro':s.url?'Live Demo':'Detail';
    html+=`<div class="sthumb${i===0?' active':''}" id="th-${i}" onclick="goTo(${i})">
      <div class="sth-num">${String(i+1).padStart(2,'0')}</div>
      <div><div class="sth-title">${s.label}</div><div class="sth-time">${s.time}</div><span class="sth-badge ${bc}">${bl}</span></div>
    </div>`;
  });
  sb.innerHTML=html;
}

function buildSlides(){
  document.getElementById('slideArea').innerHTML=
    SLIDES.map((s,i)=>`<div class="slide${i===0?' active':''}" id="sl-${i}">${s.html}</div>`).join('');
}

function goTo(n){
  if(n<0||n>=SLIDES.length)return;
  document.querySelector('.slide.active')?.classList.remove('active');
  document.querySelector('.sthumb.active')?.classList.remove('active');
  document.getElementById('sl-'+n).classList.add('active');
  document.getElementById('th-'+n).classList.add('active');
  document.getElementById('th-'+n).scrollIntoView({behavior:'smooth',block:'nearest'});
  document.getElementById('notesBody').innerHTML=SLIDES[n].notes||'';
  document.getElementById('notesT').textContent=SLIDES[n].time;
  document.getElementById('ctr').textContent=`${n+1} / ${SLIDES.length}`;
  document.getElementById('prog').style.width=((n+1)/SLIDES.length*100)+'%';
  current=n;
}

function nextSlide(){goTo(current+1);}
function prevSlide(){goTo(current-1);}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nextSlide();}
  if(e.key==='ArrowLeft'){e.preventDefault();prevSlide();}
});

buildSidebar();
buildSlides();
goTo(0);
</script>
